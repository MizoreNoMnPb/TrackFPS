# TrackFPS Configuration

# Video source
input:
  video_path: "input/Final/Brakkesh_Game2.mp4"

# Map reference images
map_dir: "assets/map"

# Team data (player names, colors)
teams_config: "config/teams.json"

# Output
output:
  dir: "output"

# Pipeline control
pipeline:
  skip_extraction: false   # set true if frames already extracted
  analyze_ui: true         # run game UI analysis (events CSV)
  track_teams: "all"       # "all", "INK", or ["INK","ESG"]

# Viewport scanning
scanning:
  scan_step: 300
  min_segment_frames: 120

# Trajectory visualization
trajectory:
  turn_threshold: 90       # degrees for marking turns
  stop_speed: 2            # px/s below this = stopped
  stop_min_duration: 0.5   # seconds minimum stop
