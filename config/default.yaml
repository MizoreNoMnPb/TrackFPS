# ============================================================
# TrackFPS Configuration
# ============================================================

# ── Video input ──
input:
  video_path: "input/Final/Brakkesh_Game2.mp4"  # 视频文件路径

# ── Reference maps ──
map_dir: "assets/map"                            # 参考地图目录 ({MapName}_unlabeled.png)

# ── Team data ──
teams_config: "config/teams.json"                # 队伍颜色、队名、选手名单

# ── Output ──
output:
  dir: "output"                                  # 输出根目录

# ── Pipeline control ──
pipeline:
  skip_extraction: false                         # true=跳过帧提取（已提取过时使用）
  analyze_ui: true                               # 运行 UI 分析生成 events.csv
  track_teams: "INK"                             # 跟踪哪些队伍: "all" / "INK" / ["INK","ESG"]

# ── Viewport scanning ──
scanning:
  scan_step: 300                                 # 每 N 帧检测一次地图视角
  min_segment_frames: 120                        # 最少帧数才算一个有效片段

# ── Trajectory visualization ──
trajectory:
  turn_threshold: 90                             # 标记转向的最小角度(度)
  stop_speed: 2                                  # 低于此速度(px/s)视为停留
  stop_min_duration: 0.5                         # 停留最短持续时间(秒)
